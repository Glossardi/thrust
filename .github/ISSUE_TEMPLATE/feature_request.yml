name: Feature request
description: Suggest an improvement to Thrust
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Thrust do?
    validations:
      required: true
  - type: textarea
    id: why-core
    attributes:
      label: Why this belongs in core
      description: Explain why this is generally useful, not app-specific
