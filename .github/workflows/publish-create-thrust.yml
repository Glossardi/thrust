name: Publish create-thrust

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install

      - name: Sync template
        run: bun run create-thrust:sync

      - name: Build client bundles
        run: bun run build:client

      - name: Run tests
        run: bun run test

      - name: Build CSS
        run: bun run build:css

      - name: Validate create-thrust variants
        run: bun run create-thrust:variant-test

      - name: Pack test create-thrust
        run: bun run create-thrust:pack-test

      - name: Install notes reference app dependencies
        run: |
          cd examples/notes-reference
          bun install

      - name: Build notes reference app
        run: |
          cd examples/notes-reference
          mkdir -p public
          bun run build:client
          bun run build:css
          bun run test

      - name: Install browser QA dependencies
        run: |
          cd qa
          bun install

      - name: Install Playwright browser
        run: |
          cd qa
          bun run install:browsers --with-deps

      - name: Browser smoke test notes reference app
        run: |
          cd qa
          bun run test:notes-reference

      - name: Publish to npm
        run: npm publish --access public
        working-directory: packages/create-thrust
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
