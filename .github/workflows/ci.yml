name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build client bundles
        run: bun run build:client

      - name: Build CSS
        run: |
          mkdir -p public
          bun run build:css

      - name: Run tests
        run: bun run test

      - name: Smoke test server
        run: |
          bun run src/index.tsx > /tmp/thrust-server.log 2>&1 &
          SERVER_PID=$!
          sleep 2
          curl -f http://localhost:3000/
          curl -f http://localhost:3000/static/style.css
          kill $SERVER_PID
          wait $SERVER_PID || true

      - name: Sync create-thrust template
        run: bun run create-thrust:sync

      - name: Validate create-thrust variants
        run: bun run create-thrust:variant-test

      - name: Scaffold minimal app
        run: |
          rm -rf /tmp/create-thrust-minimal
          node packages/create-thrust/bin/create-thrust.js /tmp/create-thrust-minimal --no-install

      - name: Validate scaffolded app
        run: |
          cd /tmp/create-thrust-minimal
          bun install
          mkdir -p public
          bun run build:client
          bun run build:css
          bun run test

      - name: Pack test create-thrust
        run: bun run create-thrust:pack-test

      - name: Install notes reference app dependencies
        run: |
          cd examples/notes-reference
          bun install

      - name: Build notes reference app
        run: |
          cd examples/notes-reference
          mkdir -p public
          bun run build:client
          bun run build:css
          bun run test

      - name: Install browser QA dependencies
        run: |
          cd qa
          bun install

      - name: Install Playwright browser
        run: |
          cd qa
          bun run install:browsers --with-deps

      - name: Browser smoke test notes reference app
        run: |
          cd qa
          bun run test:notes-reference
