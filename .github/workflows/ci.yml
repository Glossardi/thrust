name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build CSS
        run: |
          mkdir -p public
          bun run build:css

      - name: Run tests
        run: bun run test

      - name: Smoke test server
        run: |
          bun run src/index.tsx > /tmp/thrust-server.log 2>&1 &
          SERVER_PID=$!
          sleep 2
          curl -f http://localhost:3000/
          curl -f http://localhost:3000/static/style.css
          kill $SERVER_PID
          wait $SERVER_PID || true
